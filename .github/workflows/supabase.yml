name: Supabase

on:
  push:
    branches:
      - main

jobs:
  migrations:
    name: Validate and prepare database migrations
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Supabase CLI
        run: npx supabase --version

      - name: Start local database and apply migrations
        run: npx supabase db start

      - name: Lint local database schema
        run: npx supabase db lint

      - name: Link Supabase project
        if: ${{ env.SUPABASE_PROJECT_REF != '' }}
        run: npx supabase link --project-ref "$SUPABASE_PROJECT_REF" --yes

      - name: Push migrations to Supabase
        if: ${{ env.SUPABASE_PROJECT_REF != '' }}
        run: npx supabase db push --yes
